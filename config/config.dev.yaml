brand: "Conduit (dev)"   # browser tab / page title

http:
  addr: ":8080"
  read_timeout: 10s
  write_timeout: 10s
  shutdown_timeout: 15s
  allowed_origins:
    - "*"

xmpp:
  host: "localhost"
  port: 5222
  domain: "example.com"
  tls_mode: "starttls-insecure"
  resource: "conduit"
  muc_host: "conference.example.com"
  dial_timeout: 10s
  idle_shutdown: 60s
  reconnect_max_backoff: 30s

auth:
  username_header: "X-Remote-User"
  jid_mapping_file: "config/users.json.example"
  credentials_file: "config/credentials.json.example"
  # In production these would be /etc/conduit/users.json and /etc/conduit/credentials.json

dev:
  enabled: true
  username: "alice"
  password: "password123"

history:
  default_limit: 50
  max_limit: 200

log:
  level: "debug"
  format: "text"
